name: Package extension

# Builds the store-ready extension zips and attaches them to a GitHub Release.
#   * Chrome/Edge:  Claude-Studio-<ver>.zip          (manifest.json shipped as-is)
#   * Firefox/AMO:  Claude-Studio-firefox-<ver>.zip  (the Chrome zip with only manifest.json swapped
#                   for a Gecko-patched copy: background.scripts fallback + browser_specific_settings.gecko)
#   * Opera:        Claude-Studio-opera-<ver>.zip    (the Chrome zip with only manifest.json swapped for a
#                   copy whose short_name is <= 12 chars, which Opera Add-ons requires)
#                   The source manifest.json is never modified, so the Chrome/Edge build is unaffected.
#   * Push a tag like v1.0.7  -> a GitHub Release is created with all the zips attached.
#   * Or run this workflow manually (Actions tab -> Run workflow) -> download from the run's Artifacts.
#
# NOTE: do not name any env var `ZIP` — Info-ZIP's `zip` reads $ZIP/$ZIPOPT as default
# command-line arguments and would corrupt every later `zip` invocation.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build Chrome/Edge zip
        run: |
          VER=$(node -p "require('./manifest.json').version")
          echo "Packaging Claude Studio v$VER (Chrome/Edge)"
          zip -r "Claude-Studio-$VER.zip" manifest.json src icons _locales -x "icons/icon.svg"
          echo "CHROME_ZIP=Claude-Studio-$VER.zip" >> "$GITHUB_ENV"
          echo "VER=$VER" >> "$GITHUB_ENV"

      - name: Build Firefox zip (Chrome package + manifest patched for Gecko)
        run: |
          echo "Packaging Claude Studio v$VER (Firefox)"
          cp "$CHROME_ZIP" "Claude-Studio-firefox-$VER.zip"
          rm -rf _ffpatch && mkdir -p _ffpatch
          node -e '
            const fs = require("fs");
            const m = require("./manifest.json");
            // Firefox ignores background.service_worker (Gecko uses background.scripts) -> ship scripts only.
            m.background = { scripts: [m.background.service_worker] };
            // Firefox MV3 requires an explicit add-on id; declare that no user data is collected.
            m.browser_specific_settings = {
              gecko: { id: "claude-studio@ilyagvc", data_collection_permissions: { required: ["none"] } }
            };
            fs.writeFileSync("_ffpatch/manifest.json", JSON.stringify(m, null, 2));
          '
          # Replace only the manifest.json entry inside the copied Chrome zip (absolute archive path, one input).
          ( cd _ffpatch && zip "$GITHUB_WORKSPACE/Claude-Studio-firefox-$VER.zip" manifest.json )
          # Gate: confirm the zip really carries the Gecko-patched manifest.
          unzip -p "Claude-Studio-firefox-$VER.zip" manifest.json | node -e '
            let s=""; process.stdin.on("data",d=>s+=d).on("end",()=>{
              const m = JSON.parse(s);
              const id = m.browser_specific_settings && m.browser_specific_settings.gecko && m.browser_specific_settings.gecko.id;
              if (!id || m.background.service_worker) {
                console.error("Firefox manifest NOT patched:", JSON.stringify(m.background), "id=" + id);
                process.exit(1);
              }
              console.log("Firefox manifest OK -> background:", JSON.stringify(m.background), " gecko.id:", id);
            });
          '
          echo "FIREFOX_ZIP=Claude-Studio-firefox-$VER.zip" >> "$GITHUB_ENV"

      - name: Build Opera zip (Chrome package + short_name <= 12 chars)
        run: |
          echo "Packaging Claude Studio v$VER (Opera)"
          cp "$CHROME_ZIP" "Claude-Studio-opera-$VER.zip"
          rm -rf _operapatch && mkdir -p _operapatch
          node -e '
            const fs = require("fs");
            const m = require("./manifest.json");
            // Opera Add-ons rejects short_name > 12 chars ("Claude Studio" = 13). Shorten it for Opera only.
            m.short_name = "ClaudeStudio";
            fs.writeFileSync("_operapatch/manifest.json", JSON.stringify(m, null, 2));
          '
          ( cd _operapatch && zip "$GITHUB_WORKSPACE/Claude-Studio-opera-$VER.zip" manifest.json )
          # Gate: confirm short_name now fits Opera's 12-char limit.
          unzip -p "Claude-Studio-opera-$VER.zip" manifest.json | node -e '
            let s=""; process.stdin.on("data",d=>s+=d).on("end",()=>{
              const m = JSON.parse(s);
              if (!m.short_name || m.short_name.length > 12) {
                console.error("Opera short_name still too long:", m.short_name, "len=" + (m.short_name || "").length);
                process.exit(1);
              }
              console.log("Opera manifest OK -> short_name:", JSON.stringify(m.short_name), "len=" + m.short_name.length);
            });
          '
          echo "OPERA_ZIP=Claude-Studio-opera-$VER.zip" >> "$GITHUB_ENV"

      - name: Verify Firefox build with Mozilla addons-linter (non-blocking)
        run: npx --yes addons-linter@latest "$FIREFOX_ZIP" || true

      - name: Upload as workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: claude-studio-extension
          path: |
            ${{ env.CHROME_ZIP }}
            ${{ env.FIREFOX_ZIP }}
            ${{ env.OPERA_ZIP }}

      - name: Attach to GitHub Release (only when a tag is pushed)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ env.CHROME_ZIP }}
            ${{ env.FIREFOX_ZIP }}
            ${{ env.OPERA_ZIP }}
          generate_release_notes: true
