name: Package extension

# Builds the store-ready extension zips and attaches them to a GitHub Release.
#   * Chrome/Edge:  Claude-Studio-<ver>.zip          (manifest.json shipped as-is)
#   * Firefox/AMO:  Claude-Studio-firefox-<ver>.zip  (the Chrome zip with only manifest.json swapped
#                   for a Gecko-patched copy: background.scripts fallback + browser_specific_settings.gecko;
#                   the source manifest.json is never modified, so the Chrome/Edge build is unaffected)
#   * Push a tag like v1.0.7  -> a GitHub Release is created with both zips attached.
#   * Or run this workflow manually (Actions tab -> Run workflow) -> download from the run's Artifacts.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Chrome/Edge zip
        run: |
          VER=$(node -p "require('./manifest.json').version")
          echo "Packaging Claude Studio v$VER (Chrome/Edge)"
          zip -r "Claude-Studio-$VER.zip" manifest.json src icons _locales -x "icons/icon.svg"
          echo "ZIP=Claude-Studio-$VER.zip" >> "$GITHUB_ENV"
          echo "VER=$VER" >> "$GITHUB_ENV"

      - name: Build Firefox zip (Chrome package + manifest patched for Gecko)
        run: |
          echo "Packaging Claude Studio v$VER (Firefox)"
          cp "$ZIP" "Claude-Studio-firefox-$VER.zip"
          rm -rf _ffpatch && mkdir -p _ffpatch
          node -e '
            const fs = require("fs");
            const m = require("./manifest.json");
            // Firefox ignores background.service_worker (Gecko uses background.scripts) -> ship scripts only.
            m.background = { scripts: [m.background.service_worker] };
            // Firefox MV3 requires an explicit add-on id; declare that no user data is collected.
            m.browser_specific_settings = {
              gecko: { id: "claude-studio@ilyagvc", data_collection_permissions: { required: ["none"] } }
            };
            fs.writeFileSync("_ffpatch/manifest.json", JSON.stringify(m, null, 2));
          '
          # Replace only the manifest.json entry inside the copied Chrome zip (absolute archive path, one input).
          ( cd _ffpatch && zip "$GITHUB_WORKSPACE/Claude-Studio-firefox-$VER.zip" manifest.json )
          test -f "Claude-Studio-firefox-$VER.zip" || { echo "ERROR: firefox zip missing"; exit 1; }
          echo "Firefox manifest in the zip:"
          unzip -p "Claude-Studio-firefox-$VER.zip" manifest.json | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{const m=JSON.parse(s);console.log(JSON.stringify({background:m.background,gecko:m.browser_specific_settings.gecko},null,2));})"
          echo "ZIP_FF=Claude-Studio-firefox-$VER.zip" >> "$GITHUB_ENV"

      - name: Verify Firefox build with Mozilla addons-linter (non-blocking)
        run: npx --yes addons-linter@latest "$ZIP_FF" || true

      - name: Upload as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: claude-studio-extension
          path: |
            ${{ env.ZIP }}
            ${{ env.ZIP_FF }}

      - name: Attach to GitHub Release (only when a tag is pushed)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP }}
            ${{ env.ZIP_FF }}
          generate_release_notes: true
